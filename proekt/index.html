<html lang="en">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proekt</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      transition: background-color 0.3s, color 0.3s;
    }

    /* ======= SCROLLBAR ======= */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--sb-track, #1e293b); }
    ::-webkit-scrollbar-thumb { background: var(--sb-thumb, #475569); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--sb-thumb-hover, #64748b); }

    /* ======= THEME TOGGLE BUTTON ======= */
    #theme-toggle-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    #theme-toggle-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #818cf8;
    }
    #theme-toggle-btn svg {
      width: 20px;
      height: 20px;
    }
    body.light-theme #theme-toggle-btn {
      color: #475569;
    }
    body.light-theme #theme-toggle-btn:hover {
      background: rgba(0,0,0,0.07);
      color: #4f46e5;
    }

    /* ======= LIGHT THEME ======= */
    body.light-theme {
      background-color: #f1f5f9 !important;
      color: #1e293b !important;
      --sb-track: #e2e8f0;
      --sb-thumb: #cbd5e1;
      --sb-thumb-hover: #94a3b8;
    }

        /* HeatCalc background (light gray) */
    body.light-theme .bg-slate-900, body.light-theme .bg-slate-950,
    body.light-theme .bg-slate-900\/50, body.light-theme .bg-slate-900\/80 { background-color: #f3f4f6 !important; }

    body.light-theme [class*="bg-slate-800"] { background-color: #ffffff !important; }

    /* slate-700 -> very light (near white), catches bg-slate-700, bg-slate-700/50 etc */
    body.light-theme [class*="bg-slate-700"] { background-color: #f8fafc !important; }

    /* slate-600 -> light gray */
    body.light-theme [class*="bg-slate-600"] { background-color: #e5e7eb !important; }

    /* Borders: use wildcard too */
    body.light-theme [class*="border-slate-700"],
    body.light-theme [class*="border-slate-800"],
    body.light-theme [class*="border-slate-600"] {
      border-color: #e5e7eb !important;
    }

    /* Text colors (exact matches) */
    body.light-theme .text-slate-50, body.light-theme .text-slate-100, body.light-theme .text-white, body.light-theme .text-slate-200 { color: #111827 !important; }
    body.light-theme .text-slate-300 { color: #374151 !important; }
    body.light-theme .text-slate-400 { color: #4b5563 !important; }
    body.light-theme .text-slate-500 { color: #6b7280 !important; }

    /* Inputs & textareas */
    body.light-theme input, body.light-theme textarea, body.light-theme select {
      background-color: #ffffff !important; color: #111827 !important; border-color: #d1d5db !important;
    }
    body.light-theme input::placeholder, body.light-theme textarea::placeholder { color: #9ca3af !important; }

    /* Tables */
    body.light-theme table { background-color: #ffffff !important; color: #111827 !important; }
    body.light-theme thead tr { background-color: #f3f4f6 !important; }
    body.light-theme tbody tr:hover { background-color: #f9fafb !important; }
    body.light-theme th, body.light-theme td { border-color: #e5e7eb !important; color: #111827 !important; }

    /* Header / nav bar - fully white */
    body.light-theme nav, body.light-theme header {
      background-color: #ffffff !important; border-color: #e5e7eb !important; box-shadow: 0 1px 4px rgba(0,0,0,0.05) !important;
    }
    /* All elements inside nav/header: transparent bg, no border, no shadow */
    body.light-theme nav *, body.light-theme header * {
      background-color: transparent !important;
      border-color: transparent !important;
      box-shadow: none !important;
      outline: none !important;
    }
    /* Except active tab which should still be visible */
    body.light-theme nav button.bg-slate-700,
    body.light-theme header button.bg-slate-700 {
      background-color: #e5e7eb !important;
      border-color: #d1d5db !important;
    }
    /* Hover on icon buttons in header */
    body.light-theme nav button:hover, body.light-theme nav a:hover,
    body.light-theme header button:hover, body.light-theme header a:hover {
      background-color: rgba(0, 0, 0, 0.04) !important;
    }

    /* Primary buttons (HeatCalc Vivid Blue) */
    body.light-theme .bg-indigo-600 { background-color: #2563eb !important; }
    body.light-theme .hover\:bg-indigo-500:hover { background-color: #1d4ed8 !important; }
    body.light-theme .bg-emerald-600 { background-color: #059669 !important; }

    /* Colored text and icons */
    body.light-theme .text-emerald-400, body.light-theme .text-emerald-300 { color: #059669 !important; }
    body.light-theme .text-indigo-400, body.light-theme .text-indigo-300, body.light-theme .text-indigo-500 { color: #2563eb !important; }
    body.light-theme .text-violet-400 { color: #6d28d9 !important; }

    /* AI analysis / Add Project specific background hover logic exclusions */
    body.light-theme .bg-emerald-900, body.light-theme .bg-emerald-900\/20 { background-color: #d1fae5 !important; }
    body.light-theme .bg-indigo-900, body.light-theme .bg-indigo-950, body.light-theme .bg-indigo-900\/20 { background-color: #e0e7ff !important; }
    body.light-theme .bg-violet-900 { background-color: #ede9fe !important; }

    /* Dividers */
    body.light-theme .divide-slate-700 > * + * { border-color: #e2e8f0 !important; }

    /* Group hovers */
    body.light-theme .group:hover .group-hover\:text-indigo-300 { color: #4338ca !important; }
    body.light-theme .group:hover .group-hover\:text-emerald-300 { color: #047857 !important; }
    body.light-theme .group:hover .group-hover\:text-white { color: #0f172a !important; }

    /* Explicitly make hovers act as expected on backgrounds */
    body.light-theme .hover\:bg-slate-700\/80:hover { background-color: #cbd5e1 !important; }
    body.light-theme .hover\:bg-indigo-900\/20:hover { background-color: #c7d2fe !important; }
    body.light-theme .hover\:bg-emerald-900\/20:hover { background-color: #a7f3d0 !important; }
    
    /* Toggle switches track */
    body.light-theme [class*="bg-slate-700"]:has(input[type=checkbox]),
    body.light-theme [class*="bg-slate-600"]:has(input[type=checkbox]) {
      background-color: #cbd5e1 !important;
    }

    /* === SECTIONS PANEL (РАЗДЕЛЫ ПРОЕКТА) === */
    /* Make the entire area wrapper white to remove grey заливку */
    body.light-theme .bg-slate-900\/30 {
      background-color: #ffffff !important;
    }
    
    /* Active section row: indigo-tinted -> very light blue */
    body.light-theme .bg-indigo-500\/10 {
      background-color: #eef2ff !important;
    }
    body.light-theme .border-indigo-500\/50 {
      border-color: #a5b4fc !important;
    }
    
    /* Inactive section row and panels with /50 opacity -> pure white */
    body.light-theme .bg-slate-800\/50,
    body.light-theme .bg-slate-800\/30 {
      background-color: #ffffff !important;
    }
    /* bg-indigo-900/20 hint boxes -> very light blue */
    body.light-theme .bg-indigo-900\/20,
    body.light-theme .bg-indigo-900 {
      background-color: #e0e7ff !important;
    }
    body.light-theme .border-indigo-500\/30 {
      border-color: #c7d2fe !important;
    }


    /* White text on solid colored buttons in light theme */
    body.light-theme button[class*="bg-green-5"], body.light-theme button[class*="bg-green-6"],
    body.light-theme button[class*="bg-blue-5"], body.light-theme button[class*="bg-blue-6"],
    body.light-theme button[class*="bg-indigo-5"], body.light-theme button[class*="bg-indigo-6"],
    body.light-theme button[class*="bg-emerald-5"], body.light-theme button[class*="bg-emerald-6"],
    body.light-theme a[class*="bg-green-5"], body.light-theme a[class*="bg-green-6"],
    body.light-theme a[class*="bg-blue-5"], body.light-theme a[class*="bg-blue-6"],
    body.light-theme a[class*="bg-indigo-5"], body.light-theme a[class*="bg-indigo-6"],
    body.light-theme a[class*="bg-emerald-5"], body.light-theme a[class*="bg-emerald-6"] {
      color: #ffffff !important;
    }
    body.light-theme button[class*="bg-green-5"] *, body.light-theme button[class*="bg-green-6"] *,
    body.light-theme button[class*="bg-blue-5"] *, body.light-theme button[class*="bg-blue-6"] *,
    body.light-theme button[class*="bg-indigo-5"] *, body.light-theme button[class*="bg-indigo-6"] *,
    body.light-theme button[class*="bg-emerald-5"] *, body.light-theme button[class*="bg-emerald-6"] *,
    body.light-theme a[class*="bg-green-5"] *, body.light-theme a[class*="bg-green-6"] *,
    body.light-theme a[class*="bg-blue-5"] *, body.light-theme a[class*="bg-blue-6"] *,
    body.light-theme a[class*="bg-indigo-5"] *, body.light-theme a[class*="bg-indigo-6"] *,
    body.light-theme a[class*="bg-emerald-5"] *, body.light-theme a[class*="bg-emerald-6"] * {
      color: #ffffff !important;
    }
  </style>

<body>
  <div id="root"></div>

  <!-- Theme Toggle Button - injected into React nav via MutationObserver -->
  <script>
    (function() {
      var MOON_SVG = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      var SUN_SVG = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      var isLight = false;

      function createBtn() {
        var btn = document.createElement('button');
        btn.id = 'theme-toggle-btn';
        btn.title = '\u041f\u0435\u0440\u0435\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u0442\u0435\u043c\u0443';
        btn.innerHTML = MOON_SVG;
        btn.addEventListener('click', function() {
          isLight = !isLight;
          document.body.classList.toggle('light-theme', isLight);
          btn.innerHTML = isLight ? SUN_SVG : MOON_SVG;
        });
        return btn;
      }

      function tryInjectIntoNav() {
        // Find the nav with flex items-center gap-4 (the icon row)
        var navs = document.querySelectorAll('nav.flex.items-center.gap-4');
        if (!navs.length) {
          // Fallback: find any nav in the header area
          navs = document.querySelectorAll('nav');
        }
        for (var i = 0; i < navs.length; i++) {
          var nav = navs[i];
          // Check it has anchor or button children (icon buttons)
          if (nav.children.length > 0 && !document.getElementById('theme-toggle-btn')) {
            var btn = createBtn();
            // Insert before the first child (leftmost in the icon row)
            nav.insertBefore(btn, nav.firstChild);
            return true;
          }
        }
        return false;
      }

      // Try after DOM ready, then use MutationObserver for React render
      var observer = new MutationObserver(function() {
        if (tryInjectIntoNav()) {
          observer.disconnect();
        }
      });

      function init() {
        if (!tryInjectIntoNav()) {
          observer.observe(document.body, { childList: true, subtree: true });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
